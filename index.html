<style>

body{-webkit-text-size-adjust:100%}
.container{width:100%;max-width:430px;margin:0 auto;padding:16px 14px 28px;text-align:center}
.logo{font-size:24px;font-weight:800;color:var(--pink)}

.title{font-size:22px;line-height:1.35;margin-top:14px;font-weight:800}
.desc{color:var(--muted);font-size:14px;line-height:1.75;margin:10px 0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 4px 14px rgba(0,0,0,0.04);text-align:left;margin-top:14px}
.question-title{font-size:16px;font-weight:700;color:#333;margin-bottom:12px;line-height:1.5}
.option-list{display:flex;flex-wrap:wrap;gap:10px}

.download-box{display:none;margin-top:16px;padding:16px;border-radius:16px;background:#fff7fb;border:1px solid #f3dce7;text-align:center}
.platform-row{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.btn{background:var(--pink);color:white;padding:14px 16px;border-radius:26px;font-size:16px;font-weight:700;display:block;text-decoration:none;text-align:center;min-height:48px}
.btn.secondary{background:var(--pink2)}
.note{font-size:12px;color:#888;margin-top:10px;line-height:1.7}
.features{margin:18px 0 0;text-align:left;padding-left:20px}
.features li{margin-bottom:8px;color:#444;font-size:14px;line-height:1.65}
.qr{margin-top:20px}
.qr img{width:160px;max-width:100%;height:auto}
.footer{font-size:12px;color:#999;margin-top:20px;line-height:1.7}
.timer{font-size:13px;color:#777;margin-top:8px}
@media (max-width:360px){
.container{padding:14px 12px 24px}
.title{font-size:20px}

<body>
<div class="container">

  <div class="desc">真实用户 · 兴趣社交 · 隐私保护<br>完成简单确认后即可查看下载入口。</div>

    <div class="option-list">
      <button class="option-btn" onclick="answerCity('北京')">北京</button>
      <button class="option-btn" onclick="answerCity('上海')">上海</button>
      <button class="option-btn" onclick="answerCity('广州')">广州</button>

      <button class="option-btn" onclick="answerCity('其他城市')">其他城市</button>

  <div class="card">
    <div class="question-title">问题 2：是否有兴趣继续了解并下载我们的 APP？</div>
    <div class="option-list">
      <button class="option-btn" onclick="answerInterest('有兴趣')">有兴趣</button>
      <button class="option-btn" onclick="answerInterest('先了解一下')">先了解一下</button>
      <button class="option-btn" onclick="answerInterest('暂时不需要')">暂时不需要</button>

  <div id="downloadBox" class="download-box">
    <div style="font-size:16px;font-weight:700;color:#333;">下载入口</div>
    <div class="platform-row">
      <a class="btn" href="https://eltt9decnfzm-1366477487.cos.accelerate.myqcloud.com/DH025/pfkpof.lgsekt"
         onclick="gtag('event','download_click', {platform: 'android'});">
         下载 Android APK
      </a>

      <a class="btn secondary" href="https://gsru1m8943.rxxkrr.cn/ip907usz"
         onclick="gtag('event','download_click', {platform: 'ios'});">

</div>

<script>
let cityAnswered = false;
let interestAnswered = false;
let boxShown = false;
let timeLeft = 5;
const timerEl = document.getElementById('timerText');

function showDownloadBox(method){
  if (boxShown) return;
  boxShown = true;
  document.getElementById('downloadBox').style.display = 'block';
  if (typeof gtag === 'function') {
    gtag('event', 'download_box_show', { method: method });
  }
}

function answerCity(city){
  cityAnswered = true;
  if (typeof gtag === 'function') {
    gtag('event', 'answer_city', { city: city });
  }
  if (cityAnswered && interestAnswered) {
    showDownloadBox('answered');
  }
}

function answerInterest(choice){
  interestAnswered = true;
  if (typeof gtag === 'function') {
    gtag('event', 'answer_interest', { choice: choice });
  }
  if (cityAnswered && interestAnswered) {
    showDownloadBox('answered');
  }
}

const countdown = setInterval(function(){
  timeLeft -= 1;
  if (timeLeft > 0) {
    timerEl.innerText = '若未完成回答，' + timeLeft + ' 秒后也会显示下载入口';
  } else {
    timerEl.innerText = '下载入口已显示';
    clearInterval(countdown);
    if (!boxShown) {
      showDownloadBox('timeout_5s');
    }
  }
}, 1000);
</script>
